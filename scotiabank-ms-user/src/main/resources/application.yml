server:
  port: 9091

spring:
  profiles:
    active: dev
  application:
    name: scotiabank-ms-user
  r2dbc:
    url: ${DB_HOST:r2dbc:mysql://localhost:3306/UserDB?serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:mO1/DHN[ry}
    pool:
      max-acquire-time: 10s
      initial-size: 10
      max-size: 50
      max-idle-time: 30m
      validation-query: SELECT 1
  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:db/migration
    url: ${DB_HOST:jdbc:mysql://localhost:3306/UserDB?useSSL=false&serverTimezone=UTC}
    user: ${DB_USER:root}
    password: ${DB_PASSWORD:mO1/DHN[ry}
jwt:
  token-expiration-seconds: 1800
  secret-key: 

validation:
  password-regex: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d]{8,}$"
  password-message: "La clave debe tener mínimo 8 caracteres, incluir letras y números"

logging:
  level:
    sql: ERROR
    web: DEBUG
    pe:
      com:
        interbank: DEBUG
    org:
      data:
        r2dbc: DEBUG